name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  code-quality:
    runs-on: ubuntu-latest
    services:
      docker:
        image: docker:24-dind


    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Compose
        uses: docker/setup-buildx-action@v2

      - name: Run docker-compose up
        run: |
          docker-compose -f docker-compose.yml up -d php pgsql
          # Ждём пока Postgres будет готов
          docker exec app_pgsql pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB} -q

      - name: Run Tests & Code Quality
        run: |
          docker exec app_php bash -c "
            composer install --prefer-dist --no-progress --no-interaction &&
            ./vendor/bin/phpunit &&
            ./vendor/bin/php-cs-fixer fix --dry-run --diff &&
            ./vendor/bin/phpstan analyse -l max Modules &&
            ./vendor/bin/rector process Modules --dry-run
          "

      - name: Tear down
        run: docker-compose -f docker-compose.yml down